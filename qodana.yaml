version: "1.0"

linter: jetbrains/qodana-jvm:latest

include:
  - name: All

bootstrap: export JAVA_HOME=$QODANA_JDK_21

profile:
  name: qodana.recommended

exclude:
  - name: All
    paths:
      - build
      - .gradle
      - openspec
      - scripts
      - docs

failThreshold: 0

baseline: qodana-baseline.sarif.json
