schema: spec-driven
version: "1.2.0"

profile:
  name: OpenSpecPlugin
  description: IntelliJ IDEA plugin for OpenSpec spec-driven development
  language: Java 21
  framework: IntelliJ Platform SDK 2024.1+
  build: Gradle with IntelliJ Platform Gradle Plugin 2.11.0

context:
  - IntelliJ Platform plugin architecture (extensions, services, actions)
  - YAML and Markdown file parsing
  - OpenSpec CLI integration
  - Tree-based UI with JTree and tool windows

rules:
  - All services SHALL be registered as IntelliJ project services
  - Specs SHALL use RFC 2119 keywords (SHALL, SHOULD, MAY)
  - Scenarios SHALL follow Given-When-Then structure
  - Plugin SHALL support IntelliJ IDEA 2024.1 and later
