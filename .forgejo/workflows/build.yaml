name: Build & Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight build for the same workflow + ref when a new push lands.
# Matches the GitHub Actions concurrency contract — Forgejo Actions supports GitHub-compatible syntax.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PATH: /opt/gradle-9.0.0/bin:/opt/apache-maven-3.9.9/bin:/opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  GRADLE_OPTS: -Dorg.gradle.daemon=false

# Artifacts: use Forgejo's patched upload-artifact fork
# (https://code.forgejo.org/forgejo/upload-artifact@v4), NOT the GitHub
# `actions/upload-artifact@v4`. The GitHub action bundles @actions/artifact v2,
# which guards on GHES and aborts with GHESNotSupportedError *before* contacting
# the server — so it fails on Forgejo regardless of runner version. The Forgejo
# fork strips that guard and speaks the v4 protocol our runner+server support.
# (History: @v4 was reverted to @v3 on 2026-06-11 when the runner predated v4;
#  runner since upgraded to v12.12.0 — but the real fix is the patched fork, not the runner.)
jobs:
  build:
    runs-on: java-21
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-build-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-build-

      - name: Verify environment
        run: java -version && gradle --version

      - name: Build and Test
        run: gradle build

      - name: Upload test results
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/test-results/test/

      - name: Sign plugin
        if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
        run: gradle signPlugin
        env:
          PLUGIN_SIGNING_KEY: ${{ secrets.PLUGIN_SIGNING_KEY }}
          PLUGIN_SIGNING_CERTIFICATE: ${{ secrets.PLUGIN_SIGNING_CERTIFICATE }}
          PLUGIN_SIGNING_KEY_PASSWORD: ${{ secrets.PLUGIN_SIGNING_KEY_PASSWORD }}

      - name: Upload plugin artifact
        if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: intellij-openspec
          path: build/distributions/*-signed.zip

  verify:
    runs-on: java-21
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-verify-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-verify-

      - name: Run Plugin Verifier
        run: gradle verifyPlugin
