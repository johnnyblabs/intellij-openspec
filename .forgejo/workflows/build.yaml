name: Build & Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PATH: /opt/gradle-9.0.0/bin:/opt/apache-maven-3.9.9/bin:/opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

jobs:
  build:
    runs-on: ubuntu-latest
    container: eclipse-temurin:21-jdk-noble
    steps:
      - name: Install dependencies
        run: apt-get update -qq && apt-get install -y -qq git nodejs > /dev/null 2>&1

      - uses: actions/checkout@v4

      - name: Verify environment
        run: java -version && gradle --version

      - name: Build and Test
        run: gradle build

  verify:
    runs-on: ubuntu-latest
    container: eclipse-temurin:21-jdk-noble
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Install dependencies
        run: apt-get update -qq && apt-get install -y -qq git nodejs > /dev/null 2>&1

      - uses: actions/checkout@v4

      - name: Run Plugin Verifier
        run: gradle verifyPlugin
