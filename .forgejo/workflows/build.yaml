name: Build & Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PATH: /opt/gradle-9.0.0/bin:/opt/apache-maven-3.9.9/bin:/opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  build:
    runs-on: java-21
    steps:
      - uses: actions/checkout@v4

      - name: Verify environment
        run: java -version && gradle --version

      - name: Build and Test
        run: gradle build

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: build/test-results/test/

      - name: Sign plugin
        if: github.ref == 'refs/heads/main'
        run: gradle signPlugin
        env:
          PLUGIN_SIGNING_KEY: ${{ secrets.PLUGIN_SIGNING_KEY }}
          PLUGIN_SIGNING_CERTIFICATE: ${{ secrets.PLUGIN_SIGNING_CERTIFICATE }}
          PLUGIN_SIGNING_KEY_PASSWORD: ${{ secrets.PLUGIN_SIGNING_KEY_PASSWORD }}

      - name: Verify plugin signature
        if: github.ref == 'refs/heads/main'
        run: gradle verifyPluginSignature

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          name: OpenSpecPlugin
          path: build/distributions/*-signed.zip

  verify:
    runs-on: java-21
    steps:
      - uses: actions/checkout@v4

      - name: Run Plugin Verifier
        run: gradle verifyPlugin

  qodana:
    runs-on: java-21
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Qodana availability
        run: |
          echo "=== PATH ==="
          echo "$PATH"
          echo ""
          echo "=== Which qodana ==="
          which qodana || echo "qodana not found in PATH"
          echo ""
          echo "=== Qodana version ==="
          qodana version || echo "qodana command failed"
          echo ""
          echo "=== Check common install locations ==="
          ls -la /usr/local/bin/qodana 2>/dev/null || echo "Not in /usr/local/bin/"
          ls -la /opt/qodana* 2>/dev/null || echo "Not in /opt/"
          ls -la "$HOME/.local/bin/qodana" 2>/dev/null || echo "Not in ~/.local/bin/"

      - name: Run Qodana Analysis
        run: qodana scan --baseline qodana-baseline.sarif.json --fail-threshold 0 --save-report --report-dir build/qodana-report

      - name: Upload Qodana results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: qodana-report
          path: build/qodana-report/
