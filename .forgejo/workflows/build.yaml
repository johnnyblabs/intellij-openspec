name: Build & Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight build for the same workflow + ref when a new push lands.
# Matches the GitHub Actions concurrency contract — Forgejo Actions supports GitHub-compatible syntax.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PATH: /opt/gradle-9.0.0/bin:/opt/apache-maven-3.9.9/bin:/opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  GRADLE_OPTS: -Dorg.gradle.daemon=false

# Artifacts: use Forgejo's patched upload-artifact fork
# (https://code.forgejo.org/forgejo/upload-artifact@v4), NOT the GitHub
# `actions/upload-artifact@v4`. The GitHub action bundles @actions/artifact v2,
# which guards on GHES and aborts with GHESNotSupportedError *before* contacting
# the server — so it fails on Forgejo regardless of runner version. The Forgejo
# fork strips that guard and speaks the v4 protocol our runner+server support.
# (History: @v4 was reverted to @v3 on 2026-06-11 when the runner predated v4;
#  runner since upgraded to v12.12.0 — but the real fix is the patched fork, not the runner.)
jobs:
  build:
    runs-on: java-21
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-build-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-build-

      - name: Verify environment
        run: java -version && gradle --version

      - name: Build and Test
        run: gradle build

      - name: Upload test results
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/test-results/test/

      # Reports coverage + JUnit results to the analysis server. Runs after Build
      # and Test so the JaCoCo XML + test results exist. Host/token come from CI
      # secrets — no internal host is hardcoded (safe for the public mirror).
      - name: SonarQube analysis
        run: gradle sonar
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Generates the CycloneDX SBOM (build/reports/bom.json) and uploads it to the
      # dependency-analysis server for CVE/license visibility. Non-blocking: `if: always()`
      # plus `|| echo` keep server downtime from ever reddening the build. Host/key come
      # from CI secrets — nothing internal is hardcoded (safe for the public mirror).
      - name: SBOM → Dependency-Track
        if: always()
        run: |
          gradle cyclonedxBom
          curl -sf -X POST "$DTRACK_URL/api/v1/bom" \
            -H "X-Api-Key: $DT_API_KEY" \
            -F "autoCreate=true" \
            -F "projectName=intellij-openspec" \
            -F "projectVersion=main" \
            -F "bom=@build/reports/bom.json" || echo "DT upload skipped (non-fatal)"
        env:
          DTRACK_URL: ${{ secrets.DTRACK_URL }}
          DT_API_KEY: ${{ secrets.DT_API_KEY }}

      - name: Sign plugin
        if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
        run: gradle signPlugin
        env:
          PLUGIN_SIGNING_KEY: ${{ secrets.PLUGIN_SIGNING_KEY }}
          PLUGIN_SIGNING_CERTIFICATE: ${{ secrets.PLUGIN_SIGNING_CERTIFICATE }}
          PLUGIN_SIGNING_KEY_PASSWORD: ${{ secrets.PLUGIN_SIGNING_KEY_PASSWORD }}

      - name: Upload plugin artifact
        if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: intellij-openspec
          path: build/distributions/*-signed.zip

  verify:
    runs-on: java-21
    steps:
      - uses: actions/checkout@v4

      # DELIBERATELY NO actions/cache ON THIS JOB — do not re-add it (third time's the charm).
      # The verify job's ~/.gradle/caches includes the Plugin Verifier's downloaded IDE
      # distributions: ~19.5 GB restored AND re-saved per run, all on the runner host's
      # single NVMe pool shared with other services. Measured twice (2026-07-04 #280,
      # 2026-07-16 #319): verify runs FASTER with no cache (6.7-10 min) than the cache
      # restore alone took (~12 min), and the write storm stalls the host's shared
      # database. The build job's small dependency-only cache above is fine; IDE
      # archives must never enter actions/cache.
      - name: Run Plugin Verifier
        run: gradle verifyPlugin
