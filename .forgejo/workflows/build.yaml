name: Build & Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PATH: /opt/gradle-9.0.0/bin:/opt/apache-maven-3.9.9/bin:/opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  build:
    runs-on: java-21
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-build-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-build-

      - name: Verify environment
        run: java -version && gradle --version

      - name: Build and Test
        run: gradle build

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: build/test-results/test/

      - name: Debug ref context
        run: |
          echo "github.ref=${{ github.ref }}"
          echo "github.event_name=${{ github.event_name }}"
          echo "github.base_ref=${{ github.base_ref }}"
          echo "github.head_ref=${{ github.head_ref }}"

      - name: Sign plugin
        if: github.ref == 'refs/heads/main' || (github.event_name == 'push' && github.base_ref == 'main')
        run: gradle signPlugin
        env:
          PLUGIN_SIGNING_KEY: ${{ secrets.PLUGIN_SIGNING_KEY }}
          PLUGIN_SIGNING_CERTIFICATE: ${{ secrets.PLUGIN_SIGNING_CERTIFICATE }}
          PLUGIN_SIGNING_KEY_PASSWORD: ${{ secrets.PLUGIN_SIGNING_KEY_PASSWORD }}

      - name: Verify plugin signature
        if: github.ref == 'refs/heads/main' || (github.event_name == 'push' && github.base_ref == 'main')
        continue-on-error: true
        run: gradle verifyPluginSignature
        env:
          PLUGIN_SIGNING_KEY: ${{ secrets.PLUGIN_SIGNING_KEY }}
          PLUGIN_SIGNING_CERTIFICATE: ${{ secrets.PLUGIN_SIGNING_CERTIFICATE }}
          PLUGIN_SIGNING_KEY_PASSWORD: ${{ secrets.PLUGIN_SIGNING_KEY_PASSWORD }}

      - name: Upload plugin artifact
        if: github.ref == 'refs/heads/main' || (github.event_name == 'push' && github.base_ref == 'main')
        uses: actions/upload-artifact@v3
        with:
          name: intellij-openspec
          path: build/distributions/*-signed.zip

  verify:
    runs-on: java-21
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-verify-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-verify-

      - name: Run Plugin Verifier
        run: gradle verifyPlugin
