name: Build & Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight build for the same workflow + ref when a new push lands.
# Saves runner minutes when a PR receives multiple pushes in quick succession.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle dependencies
        uses: actions/cache@v6
        with:
          # Cache the downloaded dependency artifacts + wrapper ONLY. Deliberately
          # EXCLUDE ~/.gradle/caches/<gradle-version>/transforms — that is where the
          # IntelliJ Platform plugin *extracts* the build SDK and (on the persistent
          # self-hosted runner, when the verify job has run) the ~7 Plugin Verifier
          # IDEs, ballooning the whole ~/.gradle/caches tree to ~38 GB and making the
          # actions/cache tar restore/save take ~12 min each way (the "verify slow /
          # cancelled" symptom). Transforms are regenerable — Gradle re-extracts them
          # from the cached modules-2 archives on a miss, far cheaper than a 29 GB tar.
          # Key bumped to gradle-v2- to abandon the existing bloated cache entirely.
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-9
            ~/.gradle/wrapper
          key: gradle-v2-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-v2-

      # Coverage floor is a quality gate enforced on the self-hosted (canonical) build, where
      # it is tuned and passes (even at the ratcheted floor). GitHub's hosted runner measures
      # ~2% lower coverage: a category of tests does not execute/count there
      # (empirically NOT the OpenSpec CLI — provisioning it on this job changed the ratio by
      # 0.00), so enforcing the tuned floor on the mirror is a false failure. The mirror still
      # builds and runs the full test suite (catching real breakage); it just does not gate on
      # the coverage ratio. Do not re-add a coverage gate here without making coverage
      # environment-independent first.
      - name: Build and Test
        run: ./gradlew build -x jacocoTestCoverageVerification

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: build/test-results/test/

      - name: Sign plugin
        if: github.ref == 'refs/heads/main'
        run: ./gradlew signPlugin
        env:
          PLUGIN_SIGNING_KEY: ${{ secrets.PLUGIN_SIGNING_KEY }}
          PLUGIN_SIGNING_CERTIFICATE: ${{ secrets.PLUGIN_SIGNING_CERTIFICATE }}
          PLUGIN_SIGNING_KEY_PASSWORD: ${{ secrets.PLUGIN_SIGNING_KEY_PASSWORD }}

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        if: github.ref == 'refs/heads/main'
        with:
          name: intellij-openspec
          path: build/distributions/*-signed.zip

  cross-platform:
    # Windows + macOS verification runs ONLY on the public mirror. The self-hosted
    # runner that also executes this workflow has no Windows or macOS host and rejects
    # newer action majors, so an `os` matrix on the shared build/verify jobs would make
    # it try (and fail) those legs. Guarding this job on the server URL keeps the
    # self-hosted runner Linux-only while the mirror exercises all three platforms.
    if: ${{ contains(github.server_url, 'github.com') }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        # Git Bash on the Windows runner lets `./gradlew` resolve the same way it does
        # on macOS/Linux, so the step is identical across all matrix legs.
        shell: bash
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Provision the OpenSpec CLI (Windows leg)
        # The Windows-only `.cmd` shim integration test needs a real CLI at the 1.5.0
        # floor on PATH. macOS/Linux legs don't run that gated test, so skip the install.
        if: runner.os == 'Windows'
        run: npm install -g @fission-ai/openspec@latest

      - name: Build and Test
        run: ./gradlew --console=plain test

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: build/test-results/test/

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      # No Gradle cache on this job by design. The Plugin Verifier pulls multi-GB of
      # IDEs into ~/.gradle; caching them makes the runner's post-job steps (cache tar
      # and/or workspace teardown of that large tree) exceed the maximum run time and
      # get cancelled — even though verifyPlugin itself succeeds. Re-downloading per run
      # is the reliable trade-off; the bulk is re-fetched anyway.
      - name: Run Plugin Verifier
        run: ./gradlew verifyPlugin
