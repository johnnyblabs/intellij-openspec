name: Release & Publish

on:
  push:
    tags: ['v*']

# Serialize release runs (workflow-scoped, NOT ref-scoped). Two rapid tag pushes
# should queue, never cancel — concurrent `publishPlugin` invocations against the
# JetBrains Marketplace API are unsafe. If a release fails partway through, cancel
# the failed run manually before pushing a hotfix tag so the queue clears.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-release-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-release-

      - name: Build and Test
        run: ./gradlew build

      - name: Sign plugin
        run: ./gradlew signPlugin
        env:
          PLUGIN_SIGNING_KEY: ${{ secrets.PLUGIN_SIGNING_KEY }}
          PLUGIN_SIGNING_CERTIFICATE: ${{ secrets.PLUGIN_SIGNING_CERTIFICATE }}
          PLUGIN_SIGNING_KEY_PASSWORD: ${{ secrets.PLUGIN_SIGNING_KEY_PASSWORD }}

      # Pre-publish signature gate. Verifies the signed artifact against its certificate
      # chain BEFORE publishing, so a mis-signed zip never reaches the Marketplace.
      #
      # We invoke the Marketplace ZIP Signer CLI directly rather than Gradle's
      # `verifyPluginSignature` task: that task mis-handles a certificate chain supplied via
      # environment variable (it splats the raw PEM onto the command line → exit 64,
      # upstream intellij-platform-gradle-plugin#2008). signPlugin already downloads the
      # signer's -cli jar into the Gradle cache; we reuse it. A non-zero exit fails the
      # release before publishPlugin runs.
      - name: Verify plugin signature (pre-publish gate)
        run: |
          set -euo pipefail
          SIGNED=$(ls build/distributions/*-signed.zip)
          CERT="$RUNNER_TEMP/cert-chain.pem"
          # PLUGIN_SIGNING_CERTIFICATE may be stored base64-encoded (the Gradle
          # signing plugin accepts and decodes that form) or as raw PEM. The
          # zip-signer CLI only reads raw PEM, so normalize before verifying:
          # if the value already contains a PEM header use it as-is, otherwise
          # base64-decode it. Without this the CLI reports "No certificate data
          # found" on a base64 blob even though the signature is valid.
          if printf '%s' "$PLUGIN_SIGNING_CERTIFICATE" | grep -q 'BEGIN CERTIFICATE'; then
            printf '%s' "$PLUGIN_SIGNING_CERTIFICATE" > "$CERT"
          else
            printf '%s' "$PLUGIN_SIGNING_CERTIFICATE" | base64 -d > "$CERT"
          fi
          grep -q 'BEGIN CERTIFICATE' "$CERT" || { echo "::error::normalized certificate is not PEM"; exit 1; }
          CLI_JAR=$(find ~/.gradle/caches -name 'marketplace-zip-signer-*-cli.jar' | head -1)
          [ -n "$CLI_JAR" ] || { echo "::error::marketplace-zip-signer CLI jar not found in Gradle cache"; exit 1; }
          echo "Verifying signature of $SIGNED"
          java -cp "$CLI_JAR" org.jetbrains.zip.signer.ZipSigningTool verify \
            -in "$SIGNED" -cert "$CERT"
          echo "✓ Signature verified against certificate chain"
        env:
          PLUGIN_SIGNING_CERTIFICATE: ${{ secrets.PLUGIN_SIGNING_CERTIFICATE }}

      # Publish-surface scrub gate. Blocks publishPlugin if an internal-infrastructure
      # identifier appears in the rendered release notes (Marketplace "What's New" +
      # GitHub release body) or anywhere inside the signed artifact. Last line of
      # defense behind the local pre-push guard and MarketplaceListingHygieneTest —
      # this one runs even if local gates were skipped. Same pattern set as those
      # layers; character-class boundaries, not \b (grep implementations differ).
      - name: Scrub release notes and artifact (pre-publish gate)
        run: |
          set -euo pipefail
          PATTERN='forgejo|(^|[^a-zA-Z])geek([^a-zA-Z]|$)|(^|[^a-zA-Z])plane([^a-zA-Z]|$)|OSPEC-[0-9]|OSP-[0-9]|johnb/'
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(./gradlew -q getChangelog --no-header --project-version="$VERSION" || true)
          if printf '%s\n' "$NOTES" | grep -niE "$PATTERN"; then
            echo "::error::internal identifier in rendered release notes — scrub CHANGELOG.md before releasing"
            exit 1
          fi
          SIGNED=$(ls build/distributions/*-signed.zip)
          SCAN="$RUNNER_TEMP/artifact-scan"
          mkdir -p "$SCAN" && unzip -qo "$SIGNED" -d "$SCAN"
          # Extract and scan only our own jars: third-party libs are upstream artifacts
          # (false-positive prone on common words), and internal identifiers can only
          # enter through ours. Raw .jar files are excluded from the grep — compressed
          # bytes can't be string-matched; their extracted contents are what's scanned.
          find "$SCAN" -name 'intellij-openspec-*.jar' | while read -r J; do
            unzip -qo "$J" -d "${J%.jar}-contents"
          done
          if HITS=$(grep -rlaiE "$PATTERN" "$SCAN" --exclude='*.jar'); then
            echo "$HITS"
            echo "::error::internal identifier found inside the plugin artifact"
            exit 1
          fi
          echo "Release notes and artifact scrub clean"

      - name: Publish to JetBrains Marketplace
        run: ./gradlew publishPlugin
        env:
          PLUGIN_SIGNING_KEY: ${{ secrets.PLUGIN_SIGNING_KEY }}
          PLUGIN_SIGNING_CERTIFICATE: ${{ secrets.PLUGIN_SIGNING_CERTIFICATE }}
          PLUGIN_SIGNING_KEY_PASSWORD: ${{ secrets.PLUGIN_SIGNING_KEY_PASSWORD }}
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}

      # Render release notes with the gradle-changelog-plugin — the same parser that
      # produces the Marketplace changeNotes — so both surfaces always agree. The old
      # hand-rolled awk required a space after the version header, so a bare "## vX.Y.Z"
      # (no subtitle) extracted nothing and the release shipped with empty notes.
      # Non-fatal on a missing changelog section: publishPlugin has already run by this
      # point, and action-gh-release falls back to generate_release_notes.
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(./gradlew -q getChangelog --no-header --project-version="$VERSION") \
            || { echo "::warning::no v${VERSION} section in CHANGELOG.md — falling back to generated notes"; NOTES=""; }
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/distributions/*-signed.zip
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: true
